<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Arial', sans-serif; }
    </style>
</head>
<body class="bg-green-500 font-serif">
    <div class="flex items-center justify-between p-4 bg-white border-b border-gray-300">
        <div class="kiri">
            <h1 class="text-3xl text-green-600">Welcome to my website</h1>
        </div>
        <div class="kanan">
            <ul class="flex space-x-12">
                <li><a href="index.html" class="text-green-600 transition-colors duration-300 hover:text-green-800">Kalkulator</a></li>
                <li><a href="catatan.html" class="text-green-600 transition-colors duration-300 hover:text-green-800">Catatan</a></li>
                <li><a href="jam.html" class="text-green-600 transition-colors duration-300 hover:text-green-800">Jam Digital</a></li>
            </ul>
        </div>
    </div>
<br><br><br>
    <center class="p-10">
        <div class="border border-gray-300 rounded-xl p-10 shadow-xl max-w-xl bg-white font-serif">
            <h1 class="text-4xl text-green-600">Catatan</h1><br>
            
            <textarea id="catatan" class="w-full border border-gray-300 rounded-2xl px-4 py-2 mb-4" placeholder="Masukkan catatan" rows="5"></textarea>
            
            <button type="button" id="addBtn" class="bg-green-500 text-white px-6 py-2 rounded-full font-serif transition-colors duration-300 hover:bg-white hover:border hover:text-green-500 hover:shadow-lg">
                Simpan
            </button>
            
            <table class="mt-8 border-collapse w-full">
                <thead>
                    <tr class="bg-gray-100">
                        <th class="border p-2">Tugas</th>
                        <th class="border p-2">Aksi</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody">
                    <!-- Baris akan muncul di sini -->
                </tbody>
            </table>
        </div>
    </center>
    
    <script>
        const input = document.getElementById('catatan');
        const btn = document.getElementById('addBtn');
        const tableBody = document.getElementById('taskTableBody');

        btn.addEventListener('click', () => {
            const taskText = input.value;
            if (taskText === "") return;

            // 1. Buat elemen baris (tr)
            const row = document.createElement('tr');

            // 2. Buat sel tugas (td) - class text-center untuk rata tengah
            const cellTugas = document.createElement('td');
            cellTugas.textContent = taskText;
            cellTugas.className = "border p-2 text-center";

            // 3. Buat sel aksi (td)
            const cellAksi = document.createElement('td');
            cellAksi.className = "border p-2 text-center";
            
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = "Hapus";
            deleteBtn.className = "bg-red-500 text-white px-3 py-1 rounded-md text-sm hover:bg-white hover:text-red-500 hover:border hover:shadow-lg transition-colors duration-300";
            
            deleteBtn.onclick = function() {
                row.remove();
            };

            // 4. Masukkan tombol ke sel aksi
            cellAksi.appendChild(deleteBtn);

            // 5. Masukkan kedua sel ke dalam baris
            row.appendChild(cellTugas);
            row.appendChild(cellAksi);

            // 6. Masukkan baris ke dalam tbody
            tableBody.appendChild(row);

            input.value = "";
        });
    </script>
</body>
</html>
