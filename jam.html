<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
        }
        #a1, #a2, #var1, #operator {
            height: 50px;
        }
        #btn {
            height: 50px;
            width: 100px;
        }
        #jam-digital {
            font-size: 5rem;
            font-weight: bold;
        }
        #stopwatch {
            font-size: 5rem;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-green-500 font-serif">
    <div class="flex items-center justify-between p-4 text-green-600 bg-white">
        <div class="kiri">
            <h1 class="text-3xl">Wellcome to my website</h1>
        </div>
        <div class="kanan">
            <ul class="flex space-x-12">
                <li><a href="index.html" class="text-green-600 transition-colors duration-300 hover:text-green-800">Kalkulator</a></li>
                <li><a href="catatan.html" class="text-green-600 transition-colors duration-300 hover:text-green-800">Catatan</a></li>
                <li><a href="jam.html" class="text-green-600 transition-colors duration-300 hover:text-green-800">Jam Digital</a></li>
            </ul>
        </div>
    </div>
<center>
    <br><br>
    <br>
    <br><br>
    <div class="border border-gray-300 rounded-xl p-20 shadow-md max-w-xl bg-white shadow-xl font-serif">
        <h1 class="text-3xl text-green-600">
        Jam Digital
        </h1><br>
        <div id="jam-digital">00:00:00</div>
        <br><br><br>
        <h1 class="text-3xl text-green-600">
        Stopwatch
        </h1><br>
        <h1 id="stopwatch">00:00:00</h1>
        <button onclick="start()" class="bg-green-500 text-white px-4 py-2 rounded-full font-serif">Start</button>
        <button onclick="stop()" class="bg-green-500 text-white px-4 py-2 rounded-full font-serif">Stop</button>
        <button onclick="reset()" class="bg-green-500 text-white px-4 py-2 rounded-full font-serif">Reset</button>
    </div>
</center>
    
    <!-- javascript -->
    <script>
    // --- LOGIKA JAM DIGITAL ---
    function updateJam() {
        const sekarang = new Date();
        const waktuString = sekarang.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('jam-digital').innerText = waktuString;
    }
    // Jalankan jam segera, lalu perbarui setiap detik
    updateJam();
    setInterval(updateJam, 1000);

    // --- LOGIKA STOPWATCH ---
    let detik = 0, menit = 0, jam = 0, timer = null;

    function displayStopwatch() {
        detik++;
        if (detik == 60) { detik = 0; menit++; }
        if (menit == 60) { menit = 0; jam++; }
        
        let s = detik < 10 ? "0"+detik : detik;
        let m = menit < 10 ? "0"+menit : menit;
        let h = jam < 10 ? "0"+jam : jam;
        
        document.getElementById('stopwatch').innerText = `${h}:${m}:${s}`;
    }

    function start() { 
        if (timer === null) { // Pastikan tidak ada timer yang sedang berjalan
            timer = setInterval(displayStopwatch, 1000); 
        }
    }

    function stop() { 
        clearInterval(timer); 
        timer = null; 
    }

    function reset() { 
        stop(); 
        detik = 0; menit = 0; jam = 0; 
        document.getElementById('stopwatch').innerText = "00:00:00"; 
    }
</script>
</body>
</html>
